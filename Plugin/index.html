<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, -apple-system, "SF Pro Text", "Helvetica Neue", Helvetica, Roboto,
        Arial, "PingFang SC", "PingFang TC", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    /* CSS Variables - Design System */
    :root {
      --bg1: #20212C;
      --bg2: #414250;
      --bg3: #000000;
      --fg1: #ffffff;
      --fg2: rgba(255, 255, 255, 0.4);
      --brand: #3197ff;
      --error: #f56c6c;
      --success: #4BD951;
    }

    /* Layout */
    .app {
      height: 100%;
      background: var(--bg1);
      color: var(--fg1);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      user-select: none;
      flex-shrink: 0;
    }

    .draggable {
      -webkit-app-region: drag;
    }

    .no-drag {
      -webkit-app-region: no-drag;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .app-title {
      font-size: 14px;
      line-height: 16px;
      font-weight: 400;
    }

    .btn-close {
      width: 16px;
      height: 16px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn-close:hover {
      opacity: 0.7;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: visible;
      position: relative;
    }

    /* === Init Container === */
    #initContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 0;
    }

    #initConfirm {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .init-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--fg1);
    }

    .init-components {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .init-components li {
      font-size: 12px;
      color: var(--fg2);
      padding-left: 14px;
      position: relative;
    }

    .init-components li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--brand);
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      opacity: 0.8;
    }

    #initProgress {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #initMessage {
      font-size: 12px;
      color: var(--fg2);
    }

    .init-progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .init-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--success));
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    #initPercent {
      font-size: 10px;
      color: var(--fg2);
    }

    /* === Main Container === */
    #mainContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Input Bar */
    .input-bar {
      display: flex;
      gap: 12px;
      padding: 0 12px 12px;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    #urlInput {
      flex: 1;
      height: 32px;
      padding: 0 12px;
      background: var(--bg2);
      border: none;
      border-radius: 8px;
      color: var(--fg1);
      font-size: 12px;
      outline: none;
    }

    #urlInput::placeholder {
      color: var(--fg2);
    }

    #addButton {
      border: none;
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      height: 16px;
      align-items: center;
      justify-content: center;
      padding: 0;
      position: relative;
      overflow: visible;
    }

    #addButton:hover {
      opacity: 0.7;
    }

    #addButton:active {
      opacity: 0.5;
    }

    #addButton.disabled {
      opacity: 0.2;
      pointer-events: none;
    }

    #addButton.error {
      opacity: 1;
    }

    .error-tooltip {
      position: absolute;
      bottom: calc(100% + 2px);
      right: 0;
      background: var(--bg3);
      color: var(--fg1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #addButton.error:hover .error-tooltip {
      opacity: 1;
    }

    /* Download List */
    .download-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .download-list::-webkit-scrollbar {
      width: 3px;
    }

    .download-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .download-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    /* Download Item */
    .download-item {
      background: var(--bg2);
      border-radius: 8px;
      padding: 8px 12px;
      flex-shrink: 0;
    }

    .item-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .item-progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .item-progress-fill {
      height: 100%;
      background: var(--brand);
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    .download-item.completed .item-progress-fill {
      background: var(--success);
    }

    .download-item.error .item-progress-fill {
      background: var(--error);
    }

    .item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 16px;
    }

    .item-meta {
      font-size: 10px;
      color: var(--fg2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .item-action-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px 6px;
      color: var(--fg2);
      font-size: 10px;
      line-height: 16px;
    }

    .item-action-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--fg1);
    }

    /* Utilities */
    .hidden {
      display: none !important;
    }
  </style>
  <script type="text/javascript" src="dist/plugin.js"></script>
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="draggable">
      <div class="header-content">
        <img src="assets/logo.png" alt="Logo" width="16" height="16" />
        <h1 id="appName" class="app-title"></h1>
      </div>
      <div id="closeButton" class="btn-close no-drag">
        <img src="assets/icon_x.svg" width="16" height="16" alt="Close" />
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Init Container -->
      <div id="initContainer" class="hidden">
        <!-- Confirm State -->
        <div id="initConfirm">
          <p id="initTitle" class="init-title"></p>
          <ul class="init-components">
            <li id="initComponentYtdlp"></li>
          </ul>
          <button id="initStartBtn" class="btn-primary no-drag"></button>
        </div>
        <!-- Progress State -->
        <div id="initProgress" class="hidden">
          <p id="initMessage"></p>
          <div class="init-progress-bar">
            <div id="initProgressFill" class="init-progress-fill"></div>
          </div>
          <p id="initPercent"></p>
        </div>
      </div>

      <!-- Main Container -->
      <div id="mainContainer" class="hidden">
        <div class="input-bar">
          <input type="text" id="urlInput" placeholder="" />
          <button id="addButton" class="no-drag">
            <img src="assets/icon_download.svg" width="16" height="16" alt="Add" />
            <span class="error-tooltip"></span>
          </button>
        </div>
        <div class="download-list"></div>
      </div>
    </main>
  </div>
</body>

</html>
